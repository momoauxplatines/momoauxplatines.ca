<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Momo Aux Platines</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    :root {
      --bg: #111210; --brand-00: #FAFBF9; --brand-10: #F4F6F3;
      --brand-20: #EAEDE5; --brand-30: #DEE4DA; --brand-40: #D5DCCC;
      --brand-50: #C9D3C0; --brand-60: #A2A99A; --brand-80: #51534E;
      --brand-90: #2B2D2A; --brand-100: #141513; --brand-105: #111210;
      --red: #D34242; --blue: #007AFF; --green: #34C759;
    }
    html, body { background: var(--bg); color: var(--brand-30); font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; min-height: 100dvh; }

    /* ── Login ── */
    .login-wrap { min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; }
    .login-card { background: var(--brand-100); border: 1px solid var(--brand-90); border-radius: 16px; padding: 32px 24px; display: flex; flex-direction: column; gap: 24px; width: 100%; max-width: 420px; }
    .login-heading { font-family: 'Kanit', sans-serif; font-weight: 900; font-size: 28px; color: var(--brand-20); text-transform: uppercase; }
    .login-sub { font-size: 14px; font-weight: 300; color: var(--brand-50); line-height: 1.5; }
    .login-sub a { color: var(--brand-50); }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field-label { font-family: 'Kanit', sans-serif; font-weight: 600; font-size: 11px; color: var(--brand-50); text-transform: uppercase; letter-spacing: 0.08em; }
    .field-input { background: var(--brand-90); border: 1px solid var(--brand-80); border-radius: 10px; padding: 12px 16px; font-family: inherit; font-size: 16px; font-weight: 300; color: var(--brand-00); outline: none; width: 100%; -webkit-appearance: none; transition: border-color 0.2s; }
    .field-input::placeholder { color: var(--brand-80); }
    .field-input:focus { border-color: var(--brand-50); }
    .field-input.invalid { border-color: var(--red); }
    .error-msg { font-size: 13px; font-weight: 300; color: var(--red); min-height: 18px; }
    .btn-login { background: var(--brand-20); border: none; border-radius: 14px; color: var(--brand-100); font-family: 'Kanit', sans-serif; font-weight: 700; font-size: 17px; height: 52px; width: 100%; cursor: pointer; transition: opacity 0.15s; }
    .btn-login:hover { opacity: 0.85; }
    .btn-login:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Admin shell ── */
    #admin-screen { display: none; min-height: 100dvh; }
    #admin-screen.active { display: block; }

    /* ── Fixed header ── */
    .admin-header { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: var(--brand-105); display: flex; align-items: center; justify-content: space-between; padding: 24px; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-favicon { width: 40px; height: 40px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
    .header-favicon img { width: 100%; height: 100%; object-fit: cover; }
    .header-title { font-family: 'Kanit', sans-serif; font-weight: 900; font-size: 20px; color: var(--brand-50); text-transform: uppercase; }
    .btn-admin { background: var(--brand-90); border: 1px solid var(--brand-80); border-radius: 8px; color: var(--brand-00); font-family: inherit; font-size: 18px; font-weight: 300; height: 40px; padding: 0 16px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .btn-admin:hover { background: var(--brand-80); }
    .btn-admin:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Scrollable content ── */
    .admin-content { padding-top: 88px; max-width: 800px; margin: 0 auto; }

    /* ── Language tabs ── */
    .lang-tabs { display: flex; padding: 16px; }
    .lang-tab { flex: 1; height: 48px; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 900; font-size: 18px; color: var(--brand-40); text-transform: uppercase; cursor: pointer; border: none; background: var(--brand-100); transition: background 0.15s, color 0.15s; }
    .lang-tab:first-child { border-radius: 8px 0 0 8px; margin-right: -1px; }
    .lang-tab:last-child  { border-radius: 0 8px 8px 0; }
    .lang-tab.active { background: #000; color: var(--brand-00); }

    /* ── Sections ── */
    .admin-section { padding: 24px; display: flex; flex-direction: column; gap: 24px; }
    .section-title-row { display: flex; align-items: center; justify-content: space-between; }
    .section-heading { font-family: 'Kanit', sans-serif; font-weight: 900; font-size: 28px; color: var(--brand-50); text-transform: uppercase; line-height: 31px; }
    .decade-title-row { display: flex; align-items: center; justify-content: space-between; }
    .decade-heading { font-family: 'Kanit', sans-serif; font-weight: 900; font-size: 20px; color: var(--brand-50); text-transform: uppercase; line-height: 26px; }

    /* ── Admin card ── */
    .admin-card { background: var(--brand-100); border: 1px solid var(--brand-50); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    .card-avatar { width: 56px; height: 56px; border-radius: 8px; overflow: hidden; border: 1px solid var(--brand-50); flex-shrink: 0; background: var(--brand-90); }
    .card-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .card-avatar.round { border-radius: 40px; }
    .card-name { font-size: 18px; font-weight: 300; color: var(--brand-30); line-height: 26px; }
    .card-sub  { font-size: 18px; font-weight: 300; color: var(--brand-50); line-height: 26px; }
    .card-text { font-size: 18px; font-weight: 300; color: var(--brand-50); line-height: 26px; }
    .card-link-text { font-size: 18px; font-weight: 300; color: var(--brand-50); line-height: 26px; }
    .card-thumb { position: relative; display: inline-grid; }
    .card-thumb-img { width: 91px; height: 56px; border-radius: 8px; object-fit: cover; border: 1px solid var(--brand-50); }
    .btn-card-edit { background: var(--brand-90); border: 1px solid var(--brand-80); border-radius: 8px; color: var(--brand-00); font-family: inherit; font-size: 18px; font-weight: 300; height: 40px; width: 100%; cursor: pointer; }
    .btn-card-edit:hover { background: var(--brand-80); }
    .gig-card-actions .btn-card-edit { width: auto; padding: 0 16px; }

    /* ── Empty state ── */
    .empty-state { height: 152px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 300; color: var(--brand-60); text-align: center; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--brand-90); border: 1px solid var(--brand-80); border-radius: 10px; padding: 12px 20px; font-size: 14px; font-weight: 300; color: var(--brand-20); white-space: nowrap; opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 200; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error   { border-color: var(--red);   color: var(--red); }

    /* ── Edit overlay ── */
    .edit-overlay { position: fixed; inset: 0; z-index: 100; background: var(--brand-100); display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.2s; overflow: hidden; }
    .edit-overlay.open { opacity: 1; pointer-events: auto; }
    .edit-panel { display: contents; } /* mobile: panel is transparent, overlay IS the panel */
    .edit-header { flex-shrink: 0; position: relative; background: var(--brand-100); padding: 32px 24px 24px; display: flex; flex-direction: column; gap: 12px; border-bottom: 1px solid var(--brand-90); }
    .edit-titles { padding-right: 80px; display: flex; flex-direction: column; gap: 10px; }
    .edit-title { font-family: 'Kanit', sans-serif; font-weight: 900; font-size: 32px; color: var(--brand-30); text-transform: uppercase; line-height: 36px; }
    .edit-close { position: absolute; top: 28px; right: 24px; background: var(--brand-90); border: none; cursor: pointer; padding: 4px 16px; border-radius: 8px; font-family: 'Kanit', sans-serif; font-weight: 900; font-size: 16px; color: var(--brand-00); line-height: 31px; }
    .edit-close:hover { background: var(--brand-80); }
    .edit-subtitle { font-weight: 300; font-size: 16px; line-height: 22px; color: var(--brand-50); }
    .edit-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .edit-footer { flex-shrink: 0; padding: 16px; background: var(--brand-100); box-shadow: 0 -12px 24px rgba(17,18,16,0.9); }

    /* ── Desktop: overlay becomes backdrop, panel floats centred ── */
    @media (min-width: 860px) {
      .edit-overlay { background: rgba(17,18,16,0.75); backdrop-filter: blur(6px); align-items: center; justify-content: center; }
      .edit-panel { display: flex; flex-direction: column; width: 480px; max-height: 90dvh; background: var(--brand-100); border-radius: 20px; overflow: hidden; box-shadow: 0 0 40px 20px rgba(0,0,0,0.7); }
    }
    .btn-save { background: var(--brand-10, #f4f6f3); border: none; border-radius: 8px; color: var(--brand-100); font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 1000; font-size: 18px; height: 56px; width: 100%; cursor: pointer; text-transform: uppercase; transition: background 0.15s; }
    .btn-save:hover:not(:disabled) { background: var(--brand-00, #fafbf9); }
    .btn-save:disabled { background: var(--brand-80, #51534e); color: var(--brand-100); cursor: not-allowed; }
    .btn-dark { background: var(--brand-90, #282a27); border: 1px solid var(--brand-80, #51534e); border-radius: 8px; color: var(--brand-00, #fafbf9); font-family: inherit; font-size: 18px; font-weight: 300; height: 56px; width: 100%; cursor: pointer; transition: opacity 0.15s; }
    .btn-dark:hover { opacity: 0.8; }
    .gig-live-status { display: flex; align-items: center; gap: 8px; }
    .gig-live-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--red, #d34242); flex-shrink: 0; animation: live-pulse 1.5s ease-in-out infinite; }
    @keyframes live-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .gig-live-label { font-family: 'Kanit', sans-serif; font-weight: 900; font-size: 20px; color: var(--red, #d34242); text-transform: uppercase; line-height: 26px; }

    /* ── Form fields (in edit overlay) ── */
    .edit-field { display: flex; flex-direction: column; gap: 8px; }
    .edit-label { font-family: 'Kanit', sans-serif; font-weight: 600; font-size: 13px; color: var(--brand-50); text-transform: uppercase; letter-spacing: 0.06em; }
    .edit-input { background: var(--brand-90); border: 1px solid var(--brand-80); border-radius: 12px; padding: 12px 16px; font-family: inherit; font-size: 18px; font-weight: 300; color: var(--brand-00); outline: none; width: 100%; -webkit-appearance: none; transition: border-color 0.2s; resize: none; }
    .edit-input::placeholder { color: var(--brand-80); }
    .edit-input:focus { border-color: var(--brand-50); }

    /* ── Card list gaps ── */
    #gigs-list, #reviews-list, #demos-list, .decade-cards { display: flex; flex-direction: column; gap: 24px; }

    /* ── Image picker row ── */
    .image-row { display: flex; align-items: center; gap: 24px; }
    .image-preview { width: 88px; height: 88px; border-radius: 560px; border: 1px solid var(--brand-50); overflow: hidden; flex-shrink: 0; background: var(--brand-90); }
    .image-preview img { width: 100%; height: 100%; object-fit: cover; }
    .image-preview.square { border-radius: 8px; }
    .image-preview.rect { border-radius: 8px; width: 141px; height: 88px; }

    /* ── Tags ── */
    .tags-section { display: flex; flex-direction: column; gap: 16px; }
    .tags-existing { display: flex; flex-wrap: wrap; gap: 12px; }
    .tag-chip { background: var(--brand-90); border: 1px solid var(--brand-80); border-radius: 8px; height: 40px; display: flex; align-items: center; gap: 8px; padding: 0 8px 0 16px; }
    .tag-chip span { font-size: 18px; font-weight: 300; color: var(--brand-00); white-space: nowrap; }
    .tag-remove { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: none; border: none; cursor: pointer; color: var(--red); flex-shrink: 0; }
    .tag-remove:hover { opacity: 0.7; }

    /* ── Event form fields ── */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .show-toggle-row { display: flex; align-items: center; gap: 8px; height: 40px; }
    .show-toggle-label { flex: 1; font-size: 18px; font-weight: 300; color: var(--brand-50); line-height: 26px; }
    .btn-delete-gig { background: var(--brand-90, #282a27); border: 1px solid var(--red, #d34242); border-radius: 8px; color: var(--red, #d34242); font-family: inherit; font-size: 18px; font-weight: 300; height: 56px; min-height: 56px; flex-shrink: 0; width: 100%; cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s; }
    .btn-delete-gig:hover { background: var(--red, #d34242); border-color: var(--red, #d34242); color: var(--brand-00, #fafbf9); }
    .ig-preview-wrap { display: none; flex-direction: column; gap: 10px; }
    .ig-preview-wrap.visible { display: flex; }
    .ig-preview-row { display: flex; align-items: center; gap: 12px; }
    .ig-preview-img { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; background: var(--brand-90); border: 1px solid var(--brand-80); flex-shrink: 0; }
    .ig-preview-info { display: flex; flex-direction: column; gap: 3px; }
    .ig-preview-name { font-size: 14px; font-weight: 600; color: var(--brand-20); }
    .ig-preview-status { font-size: 12px; font-weight: 300; color: var(--brand-50); }
    .ig-preview-status.ok  { color: var(--green); }
    .ig-preview-status.err { color: var(--red); }

    /* ── Gig card ── */
    .gig-card { background: #000; border: 1px solid var(--brand-50); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 24px; cursor: default; transition: opacity 0.15s; }
    .gig-card--link { cursor: pointer; }
    .gig-card--link:hover { opacity: 0.85; }
    .gig-card-top { display: flex; gap: 8px; align-items: flex-start; pointer-events: none; }
    .gig-card-avatar { width: 72px; height: 72px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: var(--brand-90); }
    .gig-card-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .gig-card-copy { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .gig-card-name { font-size: 18px; font-weight: 700; color: var(--brand-30); line-height: 1; }
    .gig-card-meta { font-size: 16px; font-weight: 300; color: var(--brand-30); line-height: 20px; }
    .gig-card-actions { display: flex; align-items: center; justify-content: space-between; }

    /* ── Requests overlay ── */
    .req-back-btn { display: flex; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; color: var(--brand-50); font-size: 18px; font-weight: 300; padding: 0; line-height: 26px; }
    .req-back-btn:hover { color: var(--brand-30); }
    .req-event-avatar { width: 40px; height: 40px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: var(--brand-90); border: 1px solid var(--brand-100); }
    .req-event-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .req-list { display: flex; flex-direction: column; gap: 16px; padding: 16px; }
    .req-section-title { font-family: 'Kanit', sans-serif; font-weight: 900; font-size: 20px; color: var(--brand-50); text-transform: uppercase; line-height: 26px; }
    .req-card { background: #000; border: 1px solid var(--brand-50); border-radius: 16px; padding: 8px; display: flex; gap: 8px; align-items: flex-start; }
    .req-art { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--brand-90); border: 1px solid var(--brand-100); }
    .req-info { flex: 1; display: flex; flex-direction: column; gap: 0; min-width: 0; }
    .req-title  { font-size: 18px; font-weight: 700; color: var(--brand-30); line-height: 1; margin-bottom: 2px; }
    .req-artist { font-size: 16px; font-weight: 300; color: var(--brand-30); line-height: 20px; }
    .req-time   { font-size: 16px; font-weight: 300; color: var(--brand-30); line-height: 20px; }
    .req-controls { display: flex; align-items: center; padding: 0 16px; align-self: stretch; }
    .req-switch { position: relative; width: 36px; height: 20px; border-radius: 100px; background: #d2d5da; border: none; cursor: pointer; flex-shrink: 0; transition: background 0.2s; }
    .req-switch.on { background: var(--green); }
    .req-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 100px; background: #fff; box-shadow: 0 2px 4px rgba(39,39,39,0.1); transition: transform 0.2s; }
    .req-switch.on::after { transform: translateX(16px); }
    .req-delete-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--red, #d34242); padding: 0; flex-shrink: 0; transition: opacity 0.15s; }
    .req-delete-btn:hover { opacity: 0.65; }
    .req-empty-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px 24px; gap: 6px; }
    .req-empty-body p { font-size: 16px; font-weight: 300; color: var(--brand-60, #888); line-height: 22px; }

  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     LOGIN
══════════════════════════════════════════════ -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <p class="login-heading">Sign In</p>
    <p class="login-sub">Enter your GitHub Personal Access Token.<br>
      Create one at <a href="https://github.com/settings/tokens/new?scopes=repo&description=Momo+Admin" target="_blank" rel="noopener">github.com/settings/tokens</a> with <strong>repo</strong> scope.</p>
    <div class="field">
      <label class="field-label" for="pat-input">GitHub Token</label>
      <input class="field-input" type="password" id="pat-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off">
    </div>
    <p class="error-msg" id="login-error"></p>
    <button class="btn-login" id="login-btn">Sign In</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     ADMIN SCREEN
══════════════════════════════════════════════ -->
<div id="admin-screen">

  <!-- Fixed header -->
  <header class="admin-header">
    <div class="header-left">
      <div class="header-favicon"><img src="../images/og-image.png" alt="Momo"></div>
      <span class="header-title">DJ Admin</span>
    </div>
    <button class="btn-admin" id="logout-btn">Sign out</button>
  </header>

  <div class="admin-content">

    <!-- Language tabs -->
    <div class="lang-tabs">
      <button class="lang-tab active" data-lang="en">EN</button>
      <button class="lang-tab" data-lang="fr">FR</button>
    </div>

    <!-- ── LIVE ── -->
    <section class="admin-section">
      <div class="section-title-row">
        <h2 class="section-heading">Live</h2>
      </div>
      <div id="live-content"><div class="empty-state">Loading…</div></div>
    </section>

    <!-- ── INTRO ── -->
    <section class="admin-section">
      <h2 class="section-heading">Intro</h2>
      <div class="admin-card" id="intro-card">
        <div class="empty-state" style="height:auto">Loading…</div>
      </div>
    </section>

    <!-- ── NEXT GIGS ── -->
    <section class="admin-section">
      <div class="section-title-row">
        <h2 class="section-heading">Next Gigs</h2>
        <button class="btn-admin" id="add-gig-btn">Add</button>
      </div>
      <div id="gigs-list"><div class="empty-state">Loading…</div></div>
    </section>

    <!-- ── REVIEWS ── -->
    <section class="admin-section">
      <div class="section-title-row">
        <h2 class="section-heading">Reviews</h2>
        <button class="btn-admin" id="add-review-btn">Add</button>
      </div>
      <div id="reviews-list"><div class="empty-state">Loading…</div></div>
    </section>

    <!-- ── DEMOS ── -->
    <section class="admin-section">
      <div class="section-title-row">
        <h2 class="section-heading">Demos</h2>
        <button class="btn-admin" id="add-demo-btn">Add</button>
      </div>
      <div id="demos-list"><div class="empty-state">Loading…</div></div>
    </section>

    <!-- ── TIMELINE ── -->
    <section class="admin-section" id="timeline-section">
      <h2 class="section-heading">Timeline</h2>

      <div style="display:flex;flex-direction:column;gap:24px;" id="decade-2020">
        <div class="decade-title-row">
          <span class="decade-heading">2020</span>
          <button class="btn-admin" data-decade="2020">Add</button>
        </div>
        <div class="decade-cards" data-decade-cards="2020"></div>
      </div>

      <div style="display:flex;flex-direction:column;gap:24px;" id="decade-2010">
        <div class="decade-title-row">
          <span class="decade-heading">2010</span>
          <button class="btn-admin" data-decade="2010">Add</button>
        </div>
        <div class="decade-cards" data-decade-cards="2010"></div>
      </div>

      <div style="display:flex;flex-direction:column;gap:24px;" id="decade-2000">
        <div class="decade-title-row">
          <span class="decade-heading">2000</span>
          <button class="btn-admin" data-decade="2000">Add</button>
        </div>
        <div class="decade-cards" data-decade-cards="2000"></div>
      </div>

      <div style="display:flex;flex-direction:column;gap:24px;" id="decade-1990">
        <div class="decade-title-row">
          <span class="decade-heading">1990</span>
          <button class="btn-admin" data-decade="1990">Add</button>
        </div>
        <div class="decade-cards" data-decade-cards="1990"></div>
      </div>

    </section>


    <div style="height:48px;"></div>

  </div><!-- /admin-content -->
</div><!-- /admin-screen -->

<div class="toast" id="toast"></div>

<script>
  const REPO    = 'momoauxplatines/momoauxplatines.ca';
  const BRANCH  = 'main';
  const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

  // ── Static content metadata ─────────────────────────────────────────────────

  const REVIEWS = [
    { id: 'simone', name: 'Simone', venue: 'La Buvette chez Simone', instagram: 'https://www.instagram.com/labuvettechezsimone', avatar: '../images/review-simone.png', textKey: 'reviews.simone.text' },
    { id: 'tmo',    name: 'TMO',    venue: '',                        instagram: 'https://www.instagram.com/taktika_officiel',      avatar: '../images/review-tmo.png',    textKey: 'reviews.tmo.text'    },
    { id: 'jessie', name: 'Jessie', venue: 'Le Birdie',               instagram: 'https://www.instagram.com/lebirdiemontreal',      avatar: '../images/review-jessie.png', textKey: 'reviews.jessie.text' },
  ];

  const DEMOS = [
    { id: 'le-bon-groove', title: 'Le Bon Groove', thumb: '../images/video-le-bon-groove.png', ytId: 'eqyngbFuLcU', descKey: 'demos.le-bon-groove.desc' },
    { id: 'jazzy-house',   title: 'Jazzy House',   thumb: '../images/video-jazzy-house.png',   ytId: 'cQRz7w4A7pc', descKey: 'demos.jazzy-house.desc'   },
    { id: 'chill',         title: 'Chill',         thumb: '../images/video-chill.png',          ytId: 'Bu2YCXoDMe4', descKey: 'demos.chill.desc'          },
    { id: 'dancehall',     title: 'Dancehall',     thumb: '../images/video-dancehall.png',      ytId: '',            descKey: 'demos.dancehall.desc'      },
  ];

  const TIMELINE = {
    '2020': [
      { id: 'buvette-simone', name: 'La Buvette chez Simone', dates: '2023–2025', instagram: 'https://www.instagram.com/labuvettechezsimone', avatar: '../images/timeline-buvette-simone.jpg', roleKey: 'timeline.buvette-simone.desc' },
      { id: 'twitch',         name: 'Twitch',                  dates: '2021–2023', instagram: 'https://www.twitch.tv/muhammadalias/about',     avatar: '../images/timeline-twitch.png',         roleKey: 'timeline.twitch.desc'         },
      { id: 'demain',         name: "Demain c'est loin",       dates: '2021–2023', instagram: 'https://baladoquebec.ca/demain-cest-loin-cjmd-969-fm-levis-lalternative-radiophonique', avatar: '../images/timeline-demain.png', roleKey: 'timeline.demain.desc' },
      { id: 'les-yeux-bleus', name: 'Les Yeux Bleus',          dates: '2022–2023', instagram: 'https://www.instagram.com/barlesyeuxbleus/', avatar: '../images/timeline-les-yeux-bleus.png', roleKey: 'timeline.les-yeux-bleus.desc' },
    ],
    '2010': [
      { id: 'focus', name: 'Focus on the two monsters', dates: '2010–2020', instagram: '', avatar: '../images/timeline-focus.png', roleKey: 'timeline.focus.desc' },
    ],
    '2000': [
      { id: 'taktika',  name: 'Taktika',  dates: '2000–2012', instagram: 'https://taktika.ca/', avatar: '../images/timeline-taktika.jpg', roleKey: 'timeline.taktika.desc' },
      { id: '83',       name: '83',       dates: '2002–2009', instagram: 'https://tidal.com/artist/3668374/u', avatar: '../images/timeline-83.jpg', roleKey: 'timeline.83.desc' },
      { id: 'club-dj',  name: 'Club DJ',  dates: '2000–2006', instagram: '', avatar: '../images/timeline-club-dj.jpg', roleKey: null },
    ],
    '1990': [
      { id: 'la-constellation', name: 'La Constellation', dates: '1998–1999', instagram: 'https://www.youtube.com/watch?v=IkPuf9plNyA', avatar: '../images/timeline-la-constellation.jpg', roleKey: 'timeline.la-constellation.desc' },
      { id: 'ast-du-son',       name: 'AST du Son',       dates: '1998–2002', instagram: 'https://chyz.ca/emission/les-arshitechs-du-son/', avatar: '../images/timeline-ast-du-son.png', roleKey: 'timeline.ast-du-son.desc' },
    ],
  };

  // ── State ──────────────────────────────────────────────────────────────────
  let token = sessionStorage.getItem('momo_admin_token') || '';
  let currentLang = 'en';
  let copyData = { en: null, fr: null };
  let copySha  = { en: null, fr: null };
  const copyBroadcast = (() => { try { return new BroadcastChannel('momo-copy'); } catch(_) { return null; } })();
  let currentEvents = [];
  let eventsSha = '';
  let editFormType = null; // 'intro' | 'review' | 'demo' | 'timeline' | 'gig'
  let editFormMeta = null; // extra context

  // ── GitHub API ──────────────────────────────────────────────────────────────
  async function ghFetch(path, opts = {}) {
    return fetch(`https://api.github.com${path}`, {
      ...opts,
      headers: {
        Authorization: `Bearer ${token}`,
        Accept: 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        ...(opts.headers || {})
      }
    });
  }

  // ── Login ───────────────────────────────────────────────────────────────────
  const loginBtn   = document.getElementById('login-btn');
  const patInput   = document.getElementById('pat-input');
  const loginError = document.getElementById('login-error');

  async function doLogin() {
    const pat = patInput.value.trim();
    if (!pat) { loginError.textContent = 'Please enter a token.'; return; }
    loginBtn.disabled = true;
    loginBtn.textContent = 'Verifying…';
    loginError.textContent = '';
    token = pat;
    const res = await ghFetch(`/repos/${REPO}/contents/events.json`);
    if (res.ok) {
      sessionStorage.setItem('momo_admin_token', pat);
      showAdmin();
    } else {
      token = '';
      loginError.textContent = res.status === 401
        ? 'Invalid token — check it has repo scope.'
        : `GitHub error ${res.status}.`;
    }
    loginBtn.disabled = false;
    loginBtn.textContent = 'Sign In';
  }

  loginBtn.addEventListener('click', doLogin);
  patInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  // ── Show admin ──────────────────────────────────────────────────────────────
  async function showAdmin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').classList.add('active');
    await Promise.all([loadAllCopy(), loadEvents()]);
    loadRegistries();
    renderAll();
  }

  function slugify(name) {
    return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 24)
      + '-' + Date.now().toString(36);
  }

  // Stable event slug — no timestamp, based on venue + date
  function eventSlug(venue, date) {
    const v = (venue || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 28);
    const d = (date || '').slice(0, 10); // YYYY-MM-DD
    return [v, d].filter(Boolean).join('-').replace(/-{2,}/g, '-');
  }

  // Build the full request page URL for an event slug
  function requestUrl(slug) {
    return `https://momoauxplatines.ca/request.html?event=${encodeURIComponent(slug)}`;
  }

  function loadRegistries() {
    // Reviews
    const rReg = (copyData['en']['reviews.registry'] || '').split('|').filter(Boolean);
    rReg.forEach(id => {
      if (REVIEWS.find(r => r.id === id)) return;
      REVIEWS.push({ id,
        name:      copyData['en'][`reviews.${id}.name`]      || id,
        venue:     copyData['en'][`reviews.${id}.venue`]     || '',
        instagram: copyData['en'][`reviews.${id}.instagram`] || '',
        avatar:    copyData['en'][`reviews.${id}.avatar`]    || '',
        textKey:  `reviews.${id}.text`
      });
    });
    // Demos
    const dReg = (copyData['en']['demos.registry'] || '').split('|').filter(Boolean);
    dReg.forEach(id => {
      if (DEMOS.find(d => d.id === id)) return;
      DEMOS.push({ id,
        title:  copyData['en'][`demos.${id}.title`]  || id,
        thumb:  copyData['en'][`demos.${id}.avatar`] || '',
        ytId:   '',
        descKey: `demos.${id}.desc`
      });
    });
    // Timeline
    Object.keys(TIMELINE).forEach(decade => {
      const tReg = (copyData['en'][`timeline.${decade}.registry`] || '').split('|').filter(Boolean);
      tReg.forEach(id => {
        if (TIMELINE[decade].find(x => x.id === id)) return;
        TIMELINE[decade].push({ id,
          name:      copyData['en'][`timeline.${id}.name`]      || id,
          dates:     copyData['en'][`timeline.${id}.dates`]     || '',
          instagram: copyData['en'][`timeline.${id}.instagram`] || '',
          avatar:    copyData['en'][`timeline.${id}.avatar`]    || '',
          roleKey:  `timeline.${id}.desc`
        });
      });
    });
  }

  // ── Logout ──────────────────────────────────────────────────────────────────
  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.removeItem('momo_admin_token');
    token = '';
    document.getElementById('login-screen').style.display = '';
    document.getElementById('admin-screen').classList.remove('active');
    patInput.value = '';
  });

  // ── Load copy ───────────────────────────────────────────────────────────────
  async function loadAllCopy() {
    await Promise.all(['en', 'fr'].map(async lang => {
      if (copyData[lang]) return;
      if (!IS_LOCAL) {
        // Production: load from Blob API
        try {
          const res = await fetch(`/api/copy?lang=${lang}`, {
            headers: { Authorization: `Bearer ${token}` }
          });
          if (res.ok) { copyData[lang] = await res.json(); return; }
        } catch {}
      }
      // Localhost or API failure: fall back to GitHub Contents API
      const res = await ghFetch(`/repos/${REPO}/contents/copy/${lang}.json?ref=${BRANCH}`);
      if (!res.ok) { copyData[lang] = {}; return; }
      const j = await res.json();
      copySha[lang] = j.sha;
      copyData[lang] = JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g, '')))));
    }));
  }

  function copy(key) {
    return (copyData[currentLang] || {})[key] || (copyData['en'] || {})[key] || '';
  }

  async function saveCopy(lang, message) {
    if (!IS_LOCAL) {
      // Production: save to Blob via API (no deploy triggered)
      const res = await fetch(`/api/copy?lang=${lang}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(copyData[lang])
      });
      if (!res.ok) throw new Error(`API ${res.status}`);
    } else {
      // Localhost: save to GitHub (triggers deploy on push)
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(copyData[lang], null, 2))));
      const res = await ghFetch(`/repos/${REPO}/contents/copy/${lang}.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, content, sha: copySha[lang], branch: BRANCH })
      });
      if (!res.ok) throw new Error(`GitHub ${res.status}`);
      const data = await res.json();
      copySha[lang] = data.content.sha;
    }
    copyBroadcast?.postMessage({ lang, data: copyData[lang] });
  }

  // ── Load events ──────────────────────────────────────────────────────────────
  async function loadEvents() {
    if (!IS_LOCAL) {
      // Production: load from Blob API
      try {
        const res = await fetch('/api/events', {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (res.ok) {
          const data = await res.json();
          currentEvents = Array.isArray(data) ? data : (data.events || []);
          return;
        }
      } catch {}
    }
    // Localhost or API failure: fall back to GitHub Contents API
    const res = await ghFetch(`/repos/${REPO}/contents/events.json?ref=${BRANCH}`);
    if (!res.ok) return;
    const data = await res.json();
    eventsSha = data.sha;
    const content = JSON.parse(atob(data.content.replace(/\n/g, '')));
    currentEvents = Array.isArray(content) ? content : (content.events || []);
  }

  async function saveEvents(message) {
    const body = JSON.stringify({ events: currentEvents }, null, 2);
    if (!IS_LOCAL) {
      // Production: save to Blob via API (no deploy triggered)
      const res = await fetch('/api/events', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body
      });
      if (!res.ok) throw new Error(`API ${res.status}`);
    } else {
      // Localhost: save to GitHub
      const res = await ghFetch(`/repos/${REPO}/contents/events.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message, content: btoa(unescape(encodeURIComponent(body))),
          sha: eventsSha, branch: BRANCH
        })
      });
      if (!res.ok) throw new Error(`GitHub ${res.status}`);
      const data = await res.json();
      eventsSha = data.content.sha;
    }
  }

  // ── Language tabs ────────────────────────────────────────────────────────────
  document.querySelector('.lang-tabs').addEventListener('click', async e => {
    const tab = e.target.closest('.lang-tab');
    if (!tab) return;
    const lang = tab.dataset.lang;
    if (lang === currentLang) return;
    currentLang = lang;
    document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === lang));
    if (!copyData[lang]) await loadAllCopy();
    renderAll();
  });

  // ── Render all sections ──────────────────────────────────────────────────────
  function renderAll() {
    renderLive();
    renderIntro();
    renderGigs();
    renderReviews();
    renderDemos();
    renderTimeline();
  }

  // ── LIVE section ──────────────────────────────────────────────────────────────
  function renderLive() {
    const el = document.getElementById('live-content');
    const now = Date.now();
    const liveEvent = currentEvents.find(ev => {
      const startMs = new Date(`${ev.date}T${ev.start_time}:00`).getTime();
      if (startMs > now) return false;
      let endDateStr = ev.date;
      if (ev.end_time <= ev.start_time) {
        const d = new Date(ev.date); d.setDate(d.getDate() + 1);
        endDateStr = d.toISOString().slice(0, 10);
      }
      const endMs = new Date(`${endDateStr}T${ev.end_time}:00`).getTime();
      return now <= endMs + 24 * 60 * 60 * 1000;
    });

    if (!liveEvent) {
      el.innerHTML = `<div class="empty-state">Not live anywhere now</div>`;
      return;
    }

    const liveIdx = currentEvents.indexOf(liveEvent);
    el.innerHTML = `
      <div class="gig-card gig-card--link" data-action="open-requests" data-index="${liveIdx}">
        <div class="gig-card-top" style="pointer-events:none;">
          <div class="gig-card-avatar">
            <img src="${liveEvent.image ? '../' + liveEvent.image.replace(/^\//, '') : ''}" alt="${esc(liveEvent.venue)}" onerror="this.style.opacity='0'">
          </div>
          <div class="gig-card-copy">
            <p class="gig-card-name">${esc(liveEvent.venue || '—')}</p>
            <p class="gig-card-meta">${esc(liveEvent.date || '')}</p>
            <p class="gig-card-meta">${esc(liveEvent.start_time || '')}–${esc(liveEvent.end_time || '')}</p>
          </div>
        </div>
        <div class="gig-card-actions" style="pointer-events:none;">
          <div class="gig-live-status" style="pointer-events:none;">
            <div class="gig-live-dot"></div>
            <span class="gig-live-label">Live</span>
          </div>
          <div style="display:flex;gap:8px;pointer-events:none;">
            ${liveEvent.slug ? `<button class="btn-card-edit" data-action="copy-url" data-url="${esc(requestUrl(liveEvent.slug))}" style="pointer-events:auto;">Copy URL</button>` : ''}
            <button class="btn-card-edit" data-action="edit-gig" data-index="${currentEvents.indexOf(liveEvent)}" style="pointer-events:auto;">Edit</button>
          </div>
        </div>
      </div>`;
  }

  // ── INTRO section ─────────────────────────────────────────────────────────────
  function renderIntro() {
    const card = document.getElementById('intro-card');
    card.innerHTML = `
      <div class="card-avatar" style="border-radius:8px;">
        <img src="../images/profile.png" alt="Momo">
      </div>
      <p class="card-name">${esc(copy('intro.title') || 'MOMO AUX PLATINES')}</p>
      <p class="card-sub">${esc((copy('intro.tags') || '').replace(/\|/g, ' · '))}</p>
      <p class="card-text">${esc(copy('intro.bio'))}</p>
      <p class="card-link-text">CONTACT</p>
      <button class="btn-card-edit" data-action="edit-intro">Edit</button>`;
  }

  // ── NEXT GIGS section ─────────────────────────────────────────────────────────
  function renderGigs() {
    const el = document.getElementById('gigs-list');
    const now = Date.now();
    const upcoming = currentEvents.filter(ev => {
      const startMs = new Date(`${ev.date}T${ev.start_time}:00`).getTime();
      return startMs > now;
    }).sort((a, b) => new Date(`${a.date}T${a.start_time}:00`) - new Date(`${b.date}T${b.start_time}:00`));

    if (!upcoming.length) {
      el.innerHTML = `<div class="empty-state">No gigs planned</div>`;
      return;
    }

    el.innerHTML = '';
    upcoming.forEach(ev => {
      const idx = currentEvents.indexOf(ev);
      const imgSrc = ev.image ? '../' + ev.image.replace(/^\//, '') : '';
      const card = document.createElement('div');
      card.className = 'gig-card gig-card--link';
      card.dataset.action = 'open-requests';
      card.dataset.index = String(idx);
      card.innerHTML = `
        <div class="gig-card-top" style="pointer-events:none;">
          <div class="gig-card-avatar">
            <img src="${imgSrc}" alt="${esc(ev.venue)}" onerror="this.style.opacity='0'">
          </div>
          <div class="gig-card-copy">
            <p class="gig-card-name">${esc(ev.venue || '—')}</p>
            <p class="gig-card-meta">${esc(ev.date || '')}</p>
            <p class="gig-card-meta">${esc(ev.start_time || '')}–${esc(ev.end_time || '')}</p>
          </div>
        </div>
        <div class="gig-card-actions" style="pointer-events:none;">
          ${ev.slug ? `<button class="btn-card-edit" data-action="copy-url" data-url="${esc(requestUrl(ev.slug))}" style="pointer-events:auto;">Copy URL</button>` : '<div></div>'}
          <button class="btn-card-edit" data-action="edit-gig" data-index="${idx}" style="pointer-events:auto;">Edit</button>
        </div>`;
      el.appendChild(card);
    });
  }

  // ── REVIEWS section ───────────────────────────────────────────────────────────
  function renderReviews() {
    const el = document.getElementById('reviews-list');
    el.innerHTML = '';
    REVIEWS.forEach(r => {
      const card = document.createElement('div');
      card.className = 'admin-card';
      const rName  = copy(`reviews.${r.id}.name`)  || r.name;
      const rVenue = copy(`reviews.${r.id}.venue`) || r.venue;
      card.innerHTML = `
        <div class="card-avatar round"><img src="${r.avatar}" alt="${esc(rName)}"></div>
        <p class="card-name">${esc(rName)}</p>
        ${rVenue ? `<p class="card-sub">${esc(rVenue)}</p>` : ''}
        <p class="card-text">${esc(copy(r.textKey))}</p>
        <p class="card-link-text">Instagram</p>
        <button class="btn-card-edit" data-action="edit-review" data-id="${r.id}">Edit</button>`;
      el.appendChild(card);
    });
  }

  // ── DEMOS section ─────────────────────────────────────────────────────────────
  function renderDemos() {
    const el = document.getElementById('demos-list');
    el.innerHTML = '';
    // Sort: available demos newest-first, coming-soon demos at the end
    const _dAvail  = DEMOS.filter(d => !(copy(`demos.${d.id}.coming-soon`) === 'true' || (!d.ytId && copy(`demos.${d.id}.coming-soon`) !== 'false')));
    const _dSoonGrp = DEMOS.filter(d =>   copy(`demos.${d.id}.coming-soon`) === 'true' || (!d.ytId && copy(`demos.${d.id}.coming-soon`) !== 'false'));
    [..._dAvail.reverse(), ..._dSoonGrp].forEach(d => {
      const card = document.createElement('div');
      card.className = 'admin-card';
      const dTitle = copy(`demos.${d.id}.title`) || d.title;
      const dLink  = copy(`demos.${d.id}.link`)  || (d.ytId ? `https://www.youtube.com/watch?v=${d.ytId}` : '');
      const dSoon  = copy(`demos.${d.id}.coming-soon`) === 'true' || (!d.ytId && copy(`demos.${d.id}.coming-soon`) !== 'false');
      card.innerHTML = `
        <div class="card-thumb">
          <img class="card-thumb-img" src="${d.thumb}" alt="${esc(dTitle)}">
        </div>
        <p class="card-name">${esc(dTitle)}</p>
        <p class="card-text">${esc(copy(d.descKey))}</p>
        ${dSoon ? '<p class="card-sub">Coming soon</p>' : dLink ? `<p class="card-link-text">YouTube</p>` : ''}
        <button class="btn-card-edit" data-action="edit-demo" data-id="${d.id}">Edit</button>`;
      el.appendChild(card);
    });
  }

  // ── TIMELINE section ──────────────────────────────────────────────────────────
  function renderTimeline() {
    Object.entries(TIMELINE).forEach(([decade, items]) => {
      const container = document.querySelector(`[data-decade-cards="${decade}"]`);
      if (!container) return;
      container.innerHTML = '';
      if (!items.length) {
        container.innerHTML = `<div class="empty-state">No entries</div>`;
        return;
      }
      items.forEach(item => {
        const iName = copy(`timeline.${item.id}.name`)  || item.name;
        const iDates = copy(`timeline.${item.id}.dates`) || item.dates;
        const iLink  = copy(`timeline.${item.id}.instagram`) || item.instagram;
        const role = item.roleKey ? copy(item.roleKey) : '';
        const card = document.createElement('div');
        card.className = 'admin-card';
        card.innerHTML = `

    if (action === 'edit-gig')      openForm('gig',      { index: parseInt(index) });
    if (action === 'delete-gig')    deleteGig(parseInt(index));
    if (action === 'open-requests') openRequests(parseInt(index));
    if (action === 'open-event-page') window.open(btn.dataset.url, '_blank');
    if (action === 'copy-url') {
      e.stopPropagation();
      navigator.clipboard.writeText(btn.dataset.url).then(() => {

      // Wire up image picker

        chip.innerHTML = `<span>${esc(label)}</span><button type="button" class="tag-remove" aria-label="Remove tag">✕</button>`;

    if (type === 'review') {

      editBody.innerHTML = `
        <input type="file" id="ef-img-input" accept="image/*" style="display:none">

          <div class="image-preview rect">

          <label class="edit-label">Description*</label>
          <textarea class="edit-input ${isNew ? 'empty' : ''}" id="ef-desc" rows="5" placeholder="Describe the vibe…">${isNew ? '' : esc(copy(meta.descKey))}</textarea>
        </div>
        <div class="edit-field">
          <label class="edit-label">YouTube link</label>
          <input class="edit-input ${isNew ? 'empty' : ''}" type="url" id="ef-ytlink" value="${esc(ytLink)}" placeholder="https://www.youtube.com/watch?v=...">

        <label style="display:flex;align-items:center;gap:12px;cursor:pointer;padding:4px 0;">
          <input type="checkbox" id="ef-coming-soon" ${comingSoon ? 'checked' : ''} style="width:20px;height:20px;accent-color:var(--brand-80);flex-shrink:0;">
          <span class="edit-label" style="margin:0;">Coming soon</span>
        </label>
        ${!isNew ? `<button class="btn-delete-gig" data-action="delete-demo" data-id="${meta.id}">Delete demo</button>` : ''}`;
      const imgInput = document.getElementById('ef-img-input');
      const imgPreview = document.getElementById('ef-img-preview');
      document.getElementById('ef-img-btn').addEventListener('click', () => imgInput.click());
      imgInput.addEventListener('change', () => { const f = imgInput.files[0]; if (f) { imgPreview.src = URL.createObjectURL(f); imgPreview.style.display = ''; imgPreview.style.borderRadius = '8px'; } });
    }

    if (type === 'timeline' && meta) {
      const item  = meta.item;
      const isNew = !item;
      editTitle.textContent = isNew ? 'Add Timeline Entry' : 'Edit Timeline';
      editSub.textContent   = '';
      editBody.innerHTML = `
        <input type="file" id="ef-img-input" accept="image/*" style="display:none">

        </div>

        </div>
        <div class="edit-field">
          <label class="edit-label">Description</label>
          <textarea class="edit-input ${isNew ? 'empty' : ''}" id="ef-role" rows="4" placeholder="What was the role here?">${isNew ? '' : esc(item.roleKey ? copy(item.roleKey) : '')}</textarea>
        </div>
        <div class="edit-field">
          <label class="edit-label">Dates*</label>
          <input class="edit-input ${isNew ? 'empty' : ''}" type="text" id="ef-dates" value="${isNew ? '' : esc(copy('timeline.' + item.id + '.dates') || item.dates)}" placeholder="2020–2023">

        <div class="edit-field">

          <input class="edit-input ${isNew ? 'empty' : ''}" type="url" id="ef-link" value="${isNew ? '' : esc(copy('timeline.' + item.id + '.instagram') || item.instagram)}" placeholder="https://...">

      const imgInput = document.getElementById('ef-img-input');

    if (type === 'gig') {

      editSub.textContent   = '';
      editBody.innerHTML = `
        <input type="hidden" id="ef-gig-index" value="${idx}">

        <input type="file" id="ef-gig-img-input" accept="image/*" style="display:none">

      // Wire Instagram debounce + image overwrite/revert buttons

        const igInput      = document.getElementById('ef-instagram');
        const gigImgInput  = document.getElementById('ef-gig-img-input');
        const gigPreview   = document.getElementById('ef-gig-img-preview');
        const gigStatus    = document.getElementById('ef-gig-img-status');
        const overwriteBtn = document.getElementById('ef-gig-overwrite-btn');
        const revertBtn    = document.getElementById('ef-gig-revert-btn');
        if (!igInput) return;

        function showGigPreview(src, statusText) {
          if (!src) { gigPreview.style.display = 'none'; gigStatus.textContent = ''; return; }
          gigPreview.src = src;
          gigPreview.style.display = '';
          gigPreview.style.opacity = '';
          gigStatus.textContent = statusText || '';
        }

        function updateRevertVisibility() {
          const hasIg = !!extractIgUsername(igInput.value.trim());
          revertBtn.style.display = hasIg ? '' : 'none';
        }

        // Initial state
        if (ev?.image) {
          showGigPreview('../' + ev.image.replace(/^\//, ''), 'Current photo');
          pendingAvatarUrl = null; pendingAvatarUser = null;
        } else if (ev?.instagram) {
          const u = extractIgUsername(ev.instagram);
          if (u) {
            const src = `https://unavatar.io/instagram/${u}`;
            pendingAvatarUrl = src; pendingAvatarUser = u;
            showGigPreview(src, 'From Instagram · will be saved on save');
          }
        }
        updateRevertVisibility();

        // IG input → debounced fetch
        let igDebounce;
        igInput.addEventListener('input', () => {
          updateRevertVisibility();
          clearTimeout(igDebounce);

            if (pendingCustomFile) return;
            const u = extractIgUsername(igInput.value.trim());
            if (!u) { showGigPreview('', ''); pendingAvatarUrl = null; pendingAvatarUser = null; return; }

          showGigPreview(URL.createObjectURL(file), 'Custom photo · will be saved on save');
          saveBtn.disabled = false;

        const showToggle = document.getElementById('ef-show-toggle');
        if (showToggle) {
          showToggle.addEventListener('click', () => {

            saveBtn.disabled = false;

  function closeForm() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';

    editFormMeta = null;
    pendingCustomFile = null;

  // ── Save ──────────────────────────────────────────────────────────────────────
  saveBtn.addEventListener('click', async () => {
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';
    try {
      if (editFormType === 'intro') {
        // Upload new profile image if selected
        const imgInput = document.getElementById('ef-img-input');
        if (imgInput && imgInput.files[0]) {
          const file = imgInput.files[0];
          const base64 = (await blobToBase64(file)).split(',')[1];
          const check = await ghFetch(`/repos/${REPO}/contents/images/profile.png`);
          const body = { message: 'Update profile photo via admin', content: base64, branch: BRANCH };
          if (check.ok) body.sha = (await check.json()).sha;
          const up = await ghFetch(`/repos/${REPO}/contents/images/profile.png`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
          });
          if (!up.ok) throw new Error(`Image upload failed: ${up.status}`);
        }
        copyData[currentLang]['intro.title']    = document.getElementById('ef-title').value;
        copyData[currentLang]['intro.bio']      = document.getElementById('ef-bio').value;
        copyData[currentLang]['intro.btn.book'] = document.getElementById('ef-btn').value;
        const tagChips = [...document.querySelectorAll('#ef-tags-list .tag-chip')].map(c => c.dataset.tag);
        copyData[currentLang]['intro.tags'] = tagChips.join('|');

        showToast('Intro saved', 'success');

      if (editFormType === 'review') {
        const isNew = !editFormMeta;
        const name  = document.getElementById('ef-name')?.value.trim();
        if (!name) { showToast('Title is required', 'error'); saveBtn.disabled = false; saveBtn.textContent = 'Save'; return; }
        const id = isNew ? slugify(name) : editFormMeta.id;
        const avatarRepoPath = isNew ? `images/reviews/${id}.jpg` : editFormMeta.avatar.replace(/^\.\.\//, '').replace(/^\//, '');
        const imgInput = document.getElementById('ef-img-input');
        if (imgInput?.files[0]) await uploadImageToGitHub(imgInput.files[0], avatarRepoPath, `${isNew ? 'Add' : 'Update'} review photo: ${id}`);
        const textVal     = document.getElementById('ef-text')?.value ?? '';
        const venueVal    = document.getElementById('ef-venue')?.value ?? '';
        const igVal       = document.getElementById('ef-instagram')?.value ?? '';
        const avatarVal   = isNew ? `/${avatarRepoPath}` : (editFormMeta.avatar.startsWith('../') ? editFormMeta.avatar.slice(2) : editFormMeta.avatar);
        const langs = isNew ? ['en', 'fr'] : [currentLang];
        for (const lang of langs) {
          if (!copyData[lang]) continue;
          if (isNew) {
            const reg = (copyData[lang]['reviews.registry'] || '').split('|').filter(Boolean);
            if (!reg.includes(id)) copyData[lang]['reviews.registry'] = [...reg, id].join('|');
            copyData[lang][`reviews.${id}.avatar`] = avatarVal;
          }
          copyData[lang][`reviews.${id}.name`]      = name;
          copyData[lang][`reviews.${id}.venue`]     = venueVal;
          copyData[lang][`reviews.${id}.text`]      = textVal;
          copyData[lang][`reviews.${id}.instagram`] = igVal;
          await saveCopy(lang, `${isNew ? 'Add' : 'Update'} review: ${name} (${lang})`);
        }
        if (isNew) {
          REVIEWS.push({ id, name, venue: venueVal, instagram: igVal, avatar: '/' + avatarRepoPath, textKey: `reviews.${id}.text` });
        } else {
          const r = REVIEWS.find(x => x.id === id);
          if (r) { r.name = name; r.venue = venueVal; r.instagram = igVal; }
        }
        renderReviews();
        showToast(isNew ? 'Review added' : 'Review saved', 'success');
      }

      if (editFormType === 'demo') {
        const isNew = !editFormMeta;
        const title = document.getElementById('ef-title')?.value.trim();
        if (!title) { showToast('Title is required', 'error'); saveBtn.disabled = false; saveBtn.textContent = 'Save'; return; }
        const id = isNew ? slugify(title) : editFormMeta.id;
        const thumbRepoPath = isNew ? `images/demos/${id}.jpg` : editFormMeta.thumb.replace(/^\.\.\//, '').replace(/^\//, '');
        const imgInput = document.getElementById('ef-img-input');
        if (imgInput?.files[0]) await uploadImageToGitHub(imgInput.files[0], thumbRepoPath, `${isNew ? 'Add' : 'Update'} demo thumb: ${id}`);
        const descVal    = document.getElementById('ef-desc')?.value ?? '';
        const ytVal      = document.getElementById('ef-ytlink')?.value ?? '';
        const soonVal    = document.getElementById('ef-coming-soon')?.checked ? 'true' : 'false';
        const thumbVal   = isNew ? `/${thumbRepoPath}` : (editFormMeta.thumb.startsWith('../') ? editFormMeta.thumb.slice(2) : editFormMeta.thumb);
        const langs = isNew ? ['en', 'fr'] : [currentLang];
        for (const lang of langs) {
          if (!copyData[lang]) continue;
          if (isNew) {
            const reg = (copyData[lang]['demos.registry'] || '').split('|').filter(Boolean);
            if (!reg.includes(id)) copyData[lang]['demos.registry'] = [...reg, id].join('|');
            copyData[lang][`demos.${id}.avatar`] = thumbVal;
          }
          copyData[lang][`demos.${id}.title`]       = title;
          copyData[lang][`demos.${id}.desc`]        = descVal;
          copyData[lang][`demos.${id}.link`]        = ytVal;
          copyData[lang][`demos.${id}.coming-soon`] = soonVal;
          await saveCopy(lang, `${isNew ? 'Add' : 'Update'} demo: ${title} (${lang})`);
        }
        if (isNew) {
          DEMOS.push({ id, title, thumb: '/' + thumbRepoPath, ytId: '', descKey: `demos.${id}.desc` });
        } else {
          const d = DEMOS.find(x => x.id === id);
          if (d) d.title = title;
        }
        renderDemos();
        showToast(isNew ? 'Demo added' : 'Demo saved', 'success');
      }

      if (editFormType === 'timeline' && editFormMeta) {
        const item  = editFormMeta.item;
        const isNew = !item;
        const decade = editFormMeta.decade;
        const name  = document.getElementById('ef-name')?.value.trim();
        if (!name) { showToast('Title is required', 'error'); saveBtn.disabled = false; saveBtn.textContent = 'Save'; return; }
        const id = isNew ? slugify(name) : item.id;
        const avatarRepoPath = isNew ? `images/timeline/${id}.jpg` : item.avatar.replace(/^\.\.\//, '');
        const imgInput = document.getElementById('ef-img-input');
        if (imgInput?.files[0]) await uploadImageToGitHub(imgInput.files[0], avatarRepoPath, `${isNew ? 'Add' : 'Update'} timeline photo: ${id}`);
        const roleVal  = document.getElementById('ef-role')?.value ?? '';
        const datesVal = document.getElementById('ef-dates')?.value ?? '';
        const linkVal  = document.getElementById('ef-link')?.value ?? '';
        const avatarVal = isNew ? `/${avatarRepoPath}` : (item.avatar.startsWith('../') ? item.avatar.slice(2) : item.avatar);
        const langs = isNew ? ['en', 'fr'] : [currentLang];
        for (const lang of langs) {
          if (!copyData[lang]) continue;
          if (isNew) {
            const reg = (copyData[lang][`timeline.${decade}.registry`] || '').split('|').filter(Boolean);
            if (!reg.includes(id)) copyData[lang][`timeline.${decade}.registry`] = [...reg, id].join('|');
            copyData[lang][`timeline.${id}.avatar`] = avatarVal;
          }
          copyData[lang][`timeline.${id}.name`]      = name;
          copyData[lang][`timeline.${id}.desc`]      = roleVal;
          copyData[lang][`timeline.${id}.dates`]     = datesVal;
          copyData[lang][`timeline.${id}.instagram`] = linkVal;
          if (!isNew && item.roleKey) copyData[lang][item.roleKey] = roleVal;
          await saveCopy(lang, `${isNew ? 'Add' : 'Update'} timeline: ${name} (${lang})`);
        }
        if (isNew) {
          TIMELINE[decade].push({ id, name, dates: datesVal, instagram: linkVal, avatar: '../' + avatarRepoPath, roleKey: `timeline.${id}.desc` });
        } else {
          item.name = name; item.dates = datesVal; item.instagram = linkVal;
        }
        renderTimeline();
        showToast(isNew ? 'Entry added' : 'Entry saved', 'success');
      }

      if (editFormType === 'gig') {
        const venue = document.getElementById('ef-venue')?.value.trim();
        if (!venue) { showToast('Venue is required', 'error'); saveBtn.disabled = false; saveBtn.textContent = 'Save'; return; }

        let imagePath = document.getElementById('ef-image')?.value.trim() || '';
        const igInput = document.getElementById('ef-instagram');
        const igVal   = igInput?.value.trim() || '';
        if (pendingCustomFile) {
          try {
            const repoPath = imagePath
              ? imagePath.replace(/^\//, '')
              : `images/events/${slugify(venue)}.jpg`;
            await uploadImageToGitHub(pendingCustomFile, repoPath, `Update gig photo: ${venue}`);
            imagePath = '/' + repoPath;
            pendingCustomFile = null;
          } catch (e) { showToast('Image upload failed: ' + e.message, 'error'); }
        } else if (pendingAvatarUrl && pendingAvatarUser) {
          try {
            imagePath = await uploadAvatarToGitHub(pendingAvatarUrl, pendingAvatarUser);
          } catch (_) { imagePath = ''; }
        }

        const dateVal = document.getElementById('ef-date')?.value || '';
        const existingEv = (() => { const i = parseInt(document.getElementById('ef-gig-index')?.value); return i >= 0 ? currentEvents[i] : null; })();
        const slug = existingEv?.slug || eventSlug(venue, dateVal);

        const ev = {
          slug,
          venue,
          address:    document.getElementById('ef-address')?.value.trim() || '',
          date:       dateVal,
          start_time: document.getElementById('ef-start')?.value || '',
          end_time:   document.getElementById('ef-end')?.value || '',
          instagram:  igVal,
          image:      imagePath,
          show:       document.getElementById('ef-show-toggle')?.classList.contains('on') ?? true,
        };

        const idx = parseInt(document.getElementById('ef-gig-index')?.value);
        const isNew = idx < 0;
        if (isNew) currentEvents.push(ev);
        else currentEvents[idx] = ev;

        await saveEvents(isNew ? `Add gig: ${venue}` : `Update gig: ${venue}`);
        renderLive();
        renderGigs();
        showToast(isNew ? `"${venue}" added` : `"${venue}" updated`, 'success');
      }

      closeForm();
    } catch (e) {
      showToast('Save failed — ' + e.message, 'error');
    }
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save';
  });

  // ── Delete demo ───────────────────────────────────────────────────────────────
  async function deleteDemo(id) {
    const d = DEMOS.find(x => x.id === id);
    if (!confirm(`Delete "${d?.title || id}"?\nThis cannot be undone.`)) return;
    // Close immediately after confirmation — saves happen in the background
    closeForm();
    // Remove from in-memory array
    const idx = DEMOS.findIndex(x => x.id === id);
    if (idx >= 0) DEMOS.splice(idx, 1);
    renderDemos();
    try {
      // Remove from registry and all copy keys for both languages
      for (const lang of ['en', 'fr']) {
        if (!copyData[lang]) continue;
        copyData[lang]['demos.registry'] = (copyData[lang]['demos.registry'] || '')
          .split('|').filter(Boolean).filter(x => x !== id).join('|');
        Object.keys(copyData[lang]).forEach(k => {
          if (k.startsWith(`demos.${id}.`)) delete copyData[lang][k];
        });
        await saveCopy(lang, `Delete demo: ${id} (${lang})`);
      }
      showToast(`"${d?.title || id}" deleted`, 'success');
    } catch (e) {
      showToast('Delete failed — ' + e.message, 'error');
      // Restore on failure
      loadAllCopy().then(() => { loadRegistries(); renderDemos(); });
    }
  }

  // ── Delete gig ────────────────────────────────────────────────────────────────
  async function deleteGig(index) {
    const ev = currentEvents[index];
    if (!confirm(`Delete "${ev.venue}"?\nThis cannot be undone.`)) return;
    currentEvents.splice(index, 1);
    try {
      await saveEvents(`Delete gig: ${ev.venue}`);
      closeForm();
      renderLive();
      renderGigs();
      showToast(`"${ev.venue}" deleted`, 'success');
    } catch (e) {
      showToast('Delete failed — ' + e.message, 'error');
      loadEvents().then(() => { renderLive(); renderGigs(); });
    }
  }

  // ── Instagram avatar ──────────────────────────────────────────────────────────
  let pendingAvatarUrl = null;
  let pendingAvatarUser = null;
  let pendingCustomFile = null;

  function extractIgUsername(url) {
    const m = (url || '').match(/instagram\.com\/([^/?#]+)/);
    return m ? m[1].replace(/\/$/, '') : null;
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  async function uploadImageToGitHub(file, repoPath, message) {
    const base64 = (await blobToBase64(file)).split(',')[1];
    const check  = await ghFetch(`/repos/${REPO}/contents/${repoPath}`);
    const body   = { message, content: base64, branch: BRANCH };
    if (check.ok) body.sha = (await check.json()).sha;
    const up = await ghFetch(`/repos/${REPO}/contents/${repoPath}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
    });
    if (!up.ok) throw new Error(`Image upload failed: ${up.status}`);
  }

  async function uploadAvatarToGitHub(avatarUrl, username) {
    const res = await fetch(avatarUrl);
    if (!res.ok) throw new Error('Fetch failed');
    const blob = await res.blob();
    const dataUrl = await blobToBase64(blob);
    const base64 = dataUrl.split(',')[1];
    const ext = blob.type.includes('png') ? 'png' : 'jpg';
    const path = `images/events/${username}.${ext}`;
    let sha;
    const check = await ghFetch(`/repos/${REPO}/contents/${path}`);
    if (check.ok) sha = (await check.json()).sha;
    const body = { message: `Add venue photo: ${username}`, content: base64, branch: BRANCH };
    if (sha) body.sha = sha;
    const up = await ghFetch(`/repos/${REPO}/contents/${path}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
    });
    if (!up.ok) throw new Error(`GitHub upload ${up.status}`);
    return `/${path}`;
  }

  function showAvatarPreview(username, existingImagePath) {
    const wrap   = document.getElementById('ig-preview-wrap');
    const img    = document.getElementById('ig-preview-img');
    const name   = document.getElementById('ig-preview-name');
    const status = document.getElementById('ig-preview-status');
    if (!wrap) return;
    if (existingImagePath) {
      img.src = '../' + existingImagePath.replace(/^\//, '');
      name.textContent   = username || '';
      status.textContent = 'Current venue photo';
      status.className   = 'ig-preview-status';
      wrap.classList.add('visible');
      pendingAvatarUrl = null; pendingAvatarUser = null;
      return;
    }
    if (!username) { wrap.classList.remove('visible'); return; }
    const avatarUrl = `https://unavatar.io/instagram/${username}`;
    img.src = avatarUrl;
    img.onerror = () => { status.textContent = 'Could not load photo.'; status.className = 'ig-preview-status err'; };
    img.onload  = () => { status.textContent = 'Photo will be saved on save.'; status.className = 'ig-preview-status ok'; };
    name.textContent = '@' + username;
    wrap.classList.add('visible');
    pendingAvatarUrl = avatarUrl; pendingAvatarUser = username;
  }

  // ── Requests ──────────────────────────────────────────────────────────────────
  const reqOverlay  = document.getElementById('req-overlay');
  const reqBody     = document.getElementById('req-body');
  let reqList = [];
  let reqEventIdx = -1;
  let reqEventIsLive = false;

  function isEventLive(ev) {
    if (!ev || !ev.date) return false;
    const now = new Date();
    const todayStr = now.toISOString().slice(0, 10);
    if (ev.date !== todayStr) return false;
    const nowMins = now.getHours() * 60 + now.getMinutes();
    function toMins(t) { if (!t) return null; const p = t.split(':').map(Number); return p[0] * 60 + (p[1] || 0); }
    const start = toMins(ev.start_time);
    const end   = toMins(ev.end_time);
    if (start === null || end === null) return false;
    return nowMins >= start && nowMins < end;
  }

  function openRequests(idx) {
    reqEventIdx = idx;
    const ev = currentEvents[idx];
    reqEventIsLive = isEventLive(ev);
    const avatarEl = document.getElementById('req-event-avatar-img');
    if (avatarEl) {
      const src = ev?.image ? '../' + ev.image.replace(/^\//, '') : '';
      avatarEl.src = src;
      avatarEl.style.opacity = '';
    }
    reqOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    loadRequests();
  }

  function closeRequests() {
    reqOverlay.classList.remove('open');
    document.body.style.overflow = '';
    reqList = [];
  }

  async function loadRequests() {
    reqBody.innerHTML = '<div class="empty-state">Loading…</div>';
    const slug = currentEvents[reqEventIdx]?.slug || '';
    const qs   = slug ? `?event=${encodeURIComponent(slug)}` : '';
    try {
      const res = await fetch(`/api/requests${qs}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      reqList = await res.json();
    } catch (e) {
      reqBody.innerHTML = `<div class="empty-state" style="color:var(--red)">Failed: ${e.message}</div>`;
      return;
    }
    renderRequests();
  }

  function renderRequests() {
    reqBody.innerHTML = '';

    // "REQUESTS" heading always visible (Figma: both empty and filled states)
    const heading = document.createElement('p');
    heading.className = 'req-section-title';
    heading.textContent = 'Requests';
    reqBody.appendChild(heading);

    if (!reqList.length) {
      const emptyWrap = document.createElement('div');
      emptyWrap.className = 'req-empty-body';
      emptyWrap.innerHTML = `
        <p>No requests have been made yet.</p>
        <p style="margin-top:8px;color:var(--brand-80,#51534E)">Make a request by tapping the<br>Request button in the top header.</p>`;
      reqBody.appendChild(emptyWrap);
      return;
    }

    reqList.forEach(r => {
      const isPlayed = r.status === 'played';
      const card = document.createElement('div');
      card.className = 'req-card';
      card.dataset.id = r.id;
      // Format timestamp using r.ts (milliseconds)
      let timeStr = '';
      if (r.ts) {
        const d = new Date(r.ts);
        timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }
      // Right control: toggle switch when live, red ✕ delete when not live
      const controlHtml = reqEventIsLive
        ? `<button class="req-switch${isPlayed ? ' on' : ''}" aria-label="${isPlayed ? 'Mark as not played' : 'Mark as played'}" data-req-action="toggle" data-id="${r.id}" data-status="${isPlayed ? 'sent' : 'played'}"></button>`
        : `<button class="req-delete-btn" aria-label="Delete request" data-req-action="delete" data-id="${r.id}">
             <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
               <line x1="2" y1="2" x2="14" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
               <line x1="14" y1="2" x2="2" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
             </svg>
           </button>`;
      card.innerHTML = `
        <img class="req-art" src="${r.image || ''}" alt="" onerror="this.style.background='var(--brand-90)'">
        <div class="req-info">
          <p class="req-title">${escReq(r.title)}</p>
          ${r.artist ? `<p class="req-artist">${escReq(r.artist)}</p>` : ''}
          ${timeStr   ? `<p class="req-time">${escReq(timeStr)}</p>`   : ''}
        </div>
        <div class="req-controls">${controlHtml}</div>`;
      reqBody.appendChild(card);
    });
  }

  document.getElementById('req-close-btn').addEventListener('click', closeRequests);
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && reqOverlay.classList.contains('open')) closeRequests(); });
  document.getElementById('req-refresh-btn').addEventListener('click', loadRequests);

  reqBody.addEventListener('click', async e => {
    const btn = e.target.closest('[data-req-action]');
    if (!btn) return;
    const { reqAction, id, status } = btn.dataset;
    btn.disabled = true;
    const patchSlug = currentEvents[reqEventIdx]?.slug || '';
    const patchQs   = patchSlug ? `?event=${encodeURIComponent(patchSlug)}` : '';
    try {
      const res = await fetch(`/api/requests${patchQs}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ id, status: reqAction === 'delete' ? 'deleted' : status })
      });
      if (!res.ok) throw new Error((await res.json()).error || `HTTP ${res.status}`);
      if (reqAction === 'delete') reqList = reqList.filter(r => r.id !== id);
      else { const i = reqList.findIndex(r => r.id === id); if (i >= 0) reqList[i].status = status; }
      renderRequests();
    } catch (err) {
      showToast('Failed: ' + err.message, 'error');
      btn.disabled = false;
    }
  });

  function escReq(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }

  // ── Utils ─────────────────────────────────────────────────────────────────────
  function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }

  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  if (token) showAdmin();
</script>
</body>
</html>
